<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UJ Study">
<meta name="theme-color" content="#0a0e14">
<title>UJ Study Time Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230a0e14'/><text x='32' y='44' font-family='monospace' font-size='28' font-weight='bold' fill='%2300d4ff' text-anchor='middle'>UJ</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230a0e14'/><text x='90' y='122' font-family='monospace' font-size='80' font-weight='bold' fill='%2300d4ff' text-anchor='middle'>UJ</text></svg>">
<script>
// Inline PWA manifest
const mf = {
  name: "UJ Study Time Tracker",
  short_name: "UJ Study",
  start_url: "./",
  display: "standalone",
  background_color: "#0a0e14",
  theme_color: "#0a0e14",
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='44' fill='%230a0e14'/><text x='96' y='130' font-family='monospace' font-size='90' font-weight='bold' fill='%2300d4ff' text-anchor='middle'>UJ</text></svg>",
    sizes: "192x192", type: "image/svg+xml"
  }]
};
const blob = new Blob([JSON.stringify(mf)], {type:'application/json'});
const mfUrl = URL.createObjectURL(blob);
const lnk = document.createElement('link');
lnk.rel='manifest'; lnk.href=mfUrl;
document.head.appendChild(lnk);
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700&display=swap');
:root {
  --bg:#0a0e14; --panel:#0f1520; --border:#1e2d40;
  --accent:#00d4ff; --accent2:#00ff9d; --accent3:#ff6b35;
  --text:#c8d8e8; --dim:#4a6070;
  --mono:'Share Tech Mono',monospace; --sans:'Noto Sans KR',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;-webkit-text-size-adjust:100%;}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  min-height:100vh;padding:20px 16px 50px;overflow-x:hidden;width:100%;
  -webkit-tap-highlight-color:transparent;
}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;
  padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.hdr-l .ttl{font-family:var(--mono);font-size:11px;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;opacity:.8;margin-bottom:4px;}
.hdr-l .dt{font-family:var(--mono);font-size:24px;color:var(--text);}
.hdr-r{text-align:right;}
.hdr-r .tm{font-family:var(--mono);font-size:18px;color:var(--accent2);margin-bottom:3px;}
.hdr-r .dy{font-family:var(--sans);font-size:15px;color:var(--dim);}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--accent2);box-shadow:0 0 6px var(--accent2);
  animation:blink 1.5s ease-in-out infinite;margin-right:4px;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* PANEL */
.panel{background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:18px 16px;margin-bottom:14px;width:100%;}
.p-title{font-family:var(--sans);font-size:20px;font-weight:700;
  color:var(--text);margin-bottom:16px;}
.p-label{font-family:var(--sans);font-size:15px;font-weight:700;
  color:var(--text);margin-bottom:14px;}

/* TIME INPUT */
.tgrid{display:grid;grid-template-columns:1fr 28px 1fr;gap:6px;align-items:end;}
.tgrp{display:flex;flex-direction:column;gap:6px;}
.tgrp > span{font-family:var(--sans);font-size:14px;font-weight:700;color:var(--text);}
.aprow{display:flex;gap:4px;}
.ap{flex:1;background:var(--bg);border:1px solid var(--border);
  color:var(--dim);font-family:var(--sans);font-size:14px;font-weight:600;
  padding:8px 0;border-radius:6px;cursor:pointer;text-align:center;
  transition:all .15s;touch-action:manipulation;}
.ap.on{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent);}
.hmrow{display:flex;gap:3px;align-items:center;}
select{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:26px;padding:12px 0;border-radius:6px;
  appearance:none;-webkit-appearance:none;outline:none;
  flex:1;min-width:0;text-align:center;cursor:pointer;
}
select:focus{border-color:var(--accent);}
.colon{font-family:var(--mono);font-size:26px;color:var(--dim);flex-shrink:0;}
.arr{display:flex;align-items:center;justify-content:center;padding-top:28px;}
.arr span{font-family:var(--mono);font-size:18px;color:var(--dim);}

.brow{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.btn{border:none;border-radius:8px;cursor:pointer;font-family:var(--mono);
  width:100%;transition:all .15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.btn-save{background:var(--accent);color:var(--bg);font-size:22px;
  font-weight:bold;padding:20px 0;letter-spacing:2px;
  box-shadow:0 4px 20px rgba(0,212,255,.25);}
.btn-save:active{opacity:.8;transform:scale(.98);}
.btn-now{background:transparent;color:var(--accent2);border:1px solid var(--accent2);
  font-size:14px;padding:13px 0;font-family:var(--sans);font-weight:600;}
.btn-now:active{opacity:.6;}

/* VIEW TABS */
.tabs{display:flex;gap:6px;margin-bottom:14px;}
.tab{flex:1;background:transparent;color:var(--dim);border:1px solid var(--border);
  font-size:14px;padding:10px 0;border-radius:6px;font-family:var(--sans);
  font-weight:600;cursor:pointer;touch-action:manipulation;}
.tab.on{border-color:var(--accent2);color:var(--accent2);}

/* CHART */
.ctop{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ctop .cl{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--text);}
.ctop .cr{font-family:var(--mono);font-size:15px;color:var(--accent2);}

.chart-wrap{width:100%;overflow:hidden;}
.bars{display:flex;align-items:flex-end;gap:1px;position:relative;width:100%;}
.bars.day-bars{height:190px;padding-bottom:36px;}
.bars.mo-bars{height:170px;padding-bottom:26px;}
.bars.yr-bars{height:170px;padding-bottom:30px;}

.bunit{display:flex;flex-direction:column;align-items:center;
  flex:1;min-width:0;height:100%;justify-content:flex-end;position:relative;}
.bar{width:100%;border-radius:2px 2px 0 0;min-height:0;
  transition:height .4s cubic-bezier(.34,1.56,.64,1);}
.bar-day{background:linear-gradient(to top,var(--accent),rgba(0,150,200,.35));}
.bar-day.lit{box-shadow:0 0 8px rgba(0,212,255,.4);}
.bar-day.now{background:linear-gradient(to top,var(--accent3),rgba(255,107,53,.35));}
.bar-mo{background:linear-gradient(to top,var(--accent2),rgba(0,180,100,.3));}
.bar-mo.lit{box-shadow:0 0 6px rgba(0,255,157,.25);}
.bar-mo.now{background:linear-gradient(to top,var(--accent3),rgba(255,107,53,.3));box-shadow:0 0 10px rgba(255,107,53,.3);}
.bar-yr{background:linear-gradient(to top,#a78bfa,rgba(120,60,220,.3));}
.bar-yr.lit{box-shadow:0 0 8px rgba(167,139,250,.25);}
.bar-yr.now{background:linear-gradient(to top,var(--accent3),rgba(255,107,53,.3));}
.blbl{font-family:var(--mono);font-size:7px;color:var(--dim);
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  white-space:nowrap;text-align:center;line-height:1.4;}
.blbl .ap-tag{display:block;color:var(--accent);opacity:.8;font-size:6px;}
.bline{border-bottom:1px solid var(--border);margin-top:-1px;}

/* PERIOD NAV */
.pnav{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.pnav .nb{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-family:var(--mono);font-size:18px;width:40px;height:40px;
  border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;touch-action:manipulation;}
.pnav .nb:active{opacity:.5;}
.pnav .pl{font-family:var(--mono);font-size:20px;color:var(--text);flex:1;text-align:center;}
.pnav .pt{font-family:var(--mono);font-size:14px;color:var(--accent2);flex-shrink:0;}

/* LOG LIST */
.logs{display:flex;flex-direction:column;gap:8px;width:100%;}
.log{display:flex;align-items:center;gap:10px;font-family:var(--mono);
  font-size:15px;padding:14px;background:var(--bg);border-radius:6px;
  border-left:2px solid var(--border);cursor:pointer;touch-action:manipulation;
  transition:border-color .2s;}
.log:active{background:rgba(0,212,255,.04);}
.log.open{border-left-color:var(--accent);}
.log .lt{color:var(--accent);flex:1;}
.log .ld{color:var(--accent2);flex-shrink:0;}
.log .li{color:var(--dim);flex-shrink:0;font-size:13px;}
.empty{font-family:var(--sans);font-size:14px;color:var(--dim);
  text-align:center;padding:24px;opacity:.5;}

/* EDIT ROW */
.edit{display:none;flex-direction:column;gap:12px;padding:14px;
  background:rgba(0,212,255,.04);border:1px solid var(--accent);
  border-radius:8px;margin-top:2px;}
.edit.open{display:flex;}
.egrid{display:grid;grid-template-columns:1fr 28px 1fr;gap:6px;align-items:end;}
.egrp{display:flex;flex-direction:column;gap:5px;}
.egrp > span{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text);}
.ehmrow{display:flex;gap:3px;align-items:center;}
.ehmrow select{font-size:20px;padding:10px 0;}
.ebtns{display:flex;gap:8px;}
.e-save{flex:2;background:var(--accent);color:var(--bg);border:none;
  border-radius:6px;font-family:var(--sans);font-size:15px;font-weight:700;
  padding:13px 0;cursor:pointer;touch-action:manipulation;}
.e-save:active{opacity:.8;}
.e-del{flex:1;background:transparent;color:var(--accent3);
  border:1px solid var(--accent3);border-radius:6px;
  font-family:var(--sans);font-size:15px;font-weight:600;
  padding:13px 0;cursor:pointer;touch-action:manipulation;}
.e-del:active{opacity:.6;}

/* IO BUTTONS */
.io-btn{flex:1;border:none;border-radius:8px;font-family:var(--sans);font-size:15px;
  font-weight:700;padding:14px 0;cursor:pointer;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;transition:opacity .15s;}
.io-exp{background:var(--accent);color:var(--bg);}
.io-imp{background:transparent;color:var(--accent2);border:1px solid var(--accent2);}
.io-exp:active,.io-imp:active{opacity:.6;}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--panel);border:1px solid var(--accent2);color:var(--accent2);
  font-family:var(--mono);font-size:14px;padding:13px 24px;
  border-radius:8px;box-shadow:0 0 24px rgba(0,255,157,.2);
  opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-l">
    <div class="ttl">UJ Study Time Tracker</div>
    <div class="dt" id="hDate"></div>
  </div>
  <div class="hdr-r">
    <div class="tm" id="hTime"></div>
    <div class="dy"><span class="dot"></span><span id="hDay"></span></div>
  </div>
</div>

<!-- INPUT -->
<div class="panel">
  <div class="p-title">공부 시간 입력</div>
  <div class="tgrid">
    <div class="tgrp">
      <span>시작</span>
      <div class="aprow">
        <button class="ap on" id="sAM" onclick="setAP('s','AM')">오전</button>
        <button class="ap"    id="sPM" onclick="setAP('s','PM')">오후</button>
      </div>
      <div class="hmrow">
        <select id="sH"></select>
        <span class="colon">:</span>
        <select id="sM"></select>
      </div>
    </div>
    <div class="arr"><span>→</span></div>
    <div class="tgrp">
      <span>종료</span>
      <div class="aprow">
        <button class="ap on" id="eAM" onclick="setAP('e','AM')">오전</button>
        <button class="ap"    id="ePM" onclick="setAP('e','PM')">오후</button>
      </div>
      <div class="hmrow">
        <select id="eH"></select>
        <span class="colon">:</span>
        <select id="eM"></select>
      </div>
    </div>
  </div>
  <div class="brow">
    <button class="btn btn-save" onclick="doSave()">저장</button>
    <button class="btn btn-now"  onclick="doNow()">현재 시간 종료</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab on" id="tabDay"   onclick="switchTab('day')">일별</button>
  <button class="tab"    id="tabMonth" onclick="switchTab('month')">월별</button>
  <button class="tab"    id="tabYear"  onclick="switchTab('year')">연별</button>
</div>

<!-- DAY VIEW -->
<div id="vDay">
  <div class="panel">
    <div class="ctop">
      <span class="cl">오늘 공부 현황</span>
      <span class="cr" id="dayTotal">0분</span>
    </div>
    <div class="chart-wrap">
      <div class="bars day-bars" id="dayBars"></div>
      <div class="bline"></div>
    </div>
  </div>
  <div class="panel">
    <div class="p-label">오늘 기록 <span style="font-size:12px;font-weight:400;color:var(--dim);">탭하여 수정</span></div>
    <div class="logs" id="logList"></div>
  </div>
</div>

<!-- MONTH VIEW -->
<div id="vMonth" style="display:none;">
  <div class="panel">
    <div class="pnav">
      <button class="nb" onclick="navMonth(-1)">◀</button>
      <div class="pl" id="mLabel"></div>
      <button class="nb" onclick="navMonth(1)">▶</button>
      <span class="pt" id="mTotal"></span>
    </div>
    <div class="chart-wrap">
      <div class="bars mo-bars" id="moBars"></div>
      <div class="bline"></div>
    </div>
  </div>
</div>

<!-- YEAR VIEW -->
<div id="vYear" style="display:none;">
  <div class="panel">
    <div class="pnav">
      <button class="nb" onclick="navYear(-1)">◀</button>
      <div class="pl" id="yLabel"></div>
      <button class="nb" onclick="navYear(1)">▶</button>
      <span class="pt" id="yTotal"></span>
    </div>
    <div class="chart-wrap">
      <div class="bars yr-bars" id="yrBars"></div>
      <div class="bline"></div>
    </div>
  </div>
</div>

<!-- EXPORT / IMPORT -->
<div class="panel" id="backupPanel">
  <div class="p-label">데이터 백업 / 복원</div>
  <div style="display:flex;gap:10px;width:100%;">
    <button class="io-btn io-exp" onclick="doExport()">내보내기</button>
    <button class="io-btn io-imp" onclick="document.getElementById('ioFile').click()">가져오기</button>
  </div>
  <input type="file" id="ioFile" accept=".txt" style="display:none" onchange="doImport(event)">
  <div id="ioInfo" style="font-family:var(--mono);font-size:12px;color:var(--dim);margin-top:12px;text-align:center;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const KEY = 'ujStudy';
const p2 = n => String(n).padStart(2,'0');

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
}
function fmtMin(m) {
  if (!m || m <= 0) return '0분';
  const h = Math.floor(m/60), r = m%60;
  if (h === 0) return r+'분';
  return r ? h+'h '+r+'m' : h+'h';
}
function disp(total) {
  const h24 = Math.floor(total/60), m = total%60;
  const ap = h24 < 12 ? '오전' : '오후';
  let h12 = h24 % 12; if (!h12) h12 = 12;
  return ap+' '+h12+':'+p2(m);
}

/* ── Storage ── */
function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || '{}'); }
  catch(e) { return {}; }
}
function save(data) {
  try { localStorage.setItem(KEY, JSON.stringify(data)); }
  catch(e) { showToast('⚠ 저장 실패'); }
}

/* ── AM/PM ── */
const AP = {s:'AM', e:'AM'};
function setAP(side, val) {
  AP[side] = val;
  document.getElementById(side+'AM').classList.toggle('on', val==='AM');
  document.getElementById(side+'PM').classList.toggle('on', val==='PM');
}
function getMin(side) {
  const h12 = +document.getElementById(side+'H').value;
  const m   = +document.getElementById(side+'M').value;
  let h24;
  if (AP[side]==='AM') { h24 = (h12===12) ? 0 : h12; }
  else                 { h24 = (h12===12) ? 12 : h12+12; }
  return h24*60 + m;
}
function setMin(side, total) {
  const h24 = Math.floor(total/60), m = total%60;
  const val = h24 < 12 ? 'AM' : 'PM';
  let h12 = h24%12; if (!h12) h12=12;
  setAP(side, val);
  document.getElementById(side+'H').value = h12;
  document.getElementById(side+'M').value = m;
}

/* ── Build selects ── */
function buildSel() {
  ['s','e'].forEach(side => {
    const H = document.getElementById(side+'H');
    const M = document.getElementById(side+'M');
    H.innerHTML = ''; M.innerHTML = '';
    for (let i=1; i<=12; i++) H.add(new Option(p2(i), i));
    for (let i=0; i<60;  i++) M.add(new Option(p2(i), i));
  });
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  setMin('s', Math.max(0, nowMin - 60));
  setMin('e', nowMin);
}
function doNow() {
  const now = new Date();
  setMin('e', now.getHours()*60 + now.getMinutes());
}

/* ── Save record ── */
function doSave() {
  const s = getMin('s'), e = getMin('e');
  if (e <= s) { showToast('⚠ 종료 시간을 확인해주세요'); return; }
  const key = todayStr();
  const data = load();
  if (!data[key]) data[key] = [];
  data[key].push({s, e, dur: e-s});
  data[key].sort((a,b) => a.s - b.s);
  save(data);
  showToast('✓ '+fmtMin(e-s)+' 저장됨');
  renderDay();
  if (curTab==='month') renderMonth();
  if (curTab==='year')  renderYear();
}

/* ── Toast ── */
let tTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tTimer);
  tTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ── Day view ── */
let editIdx = -1;

function renderDay() {
  const key = todayStr();
  const data = load();
  const logs = data[key] || [];
  const hm = new Array(24).fill(0);
  logs.forEach(l => {
    for (let h=0; h<24; h++) {
      hm[h] += Math.max(0, Math.min(l.e, h*60+60) - Math.max(l.s, h*60));
    }
  });
  const maxM = Math.max(60, ...hm);
  const total = logs.reduce((s,l) => s+l.dur, 0);
  document.getElementById('dayTotal').textContent = '총 '+fmtMin(total);

  /* chart */
  const wrap = document.getElementById('dayBars');
  wrap.innerHTML = '';
  const CH = 154;
  const nowH = new Date().getHours();
  for (let h=0; h<24; h++) {
    const unit = document.createElement('div'); unit.className='bunit';
    const bar  = document.createElement('div');
    bar.className = 'bar bar-day' + (hm[h]>0?' lit':'') + (h===nowH?' now':'');
    bar.style.height = Math.round((hm[h]/maxM)*CH)+'px';
    const lbl = document.createElement('div'); lbl.className='blbl';
    if (h%6===0) {
      const tag = document.createElement('span'); tag.className='ap-tag';
      tag.textContent = h<12?'오전':'오후'; lbl.appendChild(tag);
    }
    let h12=h%12; if(!h12)h12=12;
    lbl.appendChild(document.createTextNode(h12));
    unit.appendChild(bar); unit.appendChild(lbl);
    wrap.appendChild(unit);
  }

  /* logs */
  const logDiv = document.getElementById('logList');
  logDiv.innerHTML = '';
  if (!logs.length) {
    logDiv.innerHTML = '<div class="empty">아직 기록이 없어요</div>'; return;
  }
  logs.forEach((l, i) => {
    /* log row */
    const row = document.createElement('div');
    row.className = 'log' + (editIdx===i ? ' open' : '');
    row.innerHTML = '<span class="lt">'+disp(l.s)+' → '+disp(l.e)+'</span>'
                  + '<span class="ld">'+fmtMin(l.dur)+'</span>'
                  + '<span class="li">'+(editIdx===i?'▲':'✎')+'</span>';
    row.addEventListener('click', () => { editIdx = editIdx===i ? -1 : i; renderDay(); });
    logDiv.appendChild(row);

    /* edit panel */
    const ep = document.createElement('div');
    ep.className = 'edit' + (editIdx===i ? ' open' : '');

    /* build one edit group */
    const mkEG = (label, pfx, defMin) => {
      const h24d = Math.floor(defMin/60), md = defMin%60;
      const apd = h24d<12?'AM':'PM';
      let h12d = h24d%12; if(!h12d)h12d=12;

      const g = document.createElement('div'); g.className='egrp';
      const sp = document.createElement('span'); sp.textContent=label; g.appendChild(sp);

      const apr = document.createElement('div'); apr.className='aprow';
      const amB = document.createElement('button'); amB.className='ap'+(apd==='AM'?' on':'');
      amB.textContent='오전'; amB.dataset.v='AM';
      const pmB = document.createElement('button'); pmB.className='ap'+(apd==='PM'?' on':'');
      pmB.textContent='오후'; pmB.dataset.v='PM';
      [amB,pmB].forEach(b => b.addEventListener('click', () => {
        amB.classList.toggle('on', b.dataset.v==='AM');
        pmB.classList.toggle('on', b.dataset.v==='PM');
      }));
      apr.appendChild(amB); apr.appendChild(pmB); g.appendChild(apr);

      const hr = document.createElement('div'); hr.className='ehmrow';
      const sH = document.createElement('select'); sH.id='e'+pfx+i+'h';
      const sM = document.createElement('select'); sM.id='e'+pfx+i+'m';
      for(let v=1;v<=12;v++) sH.add(new Option(p2(v),v));
      for(let v=0;v<60;v++)  sM.add(new Option(p2(v),v));
      sH.value=h12d; sM.value=md;
      const cl=document.createElement('span'); cl.className='colon'; cl.textContent=':';
      hr.appendChild(sH); hr.appendChild(cl); hr.appendChild(sM);
      g.appendChild(hr);
      return g;
    };

    const egrid = document.createElement('div'); egrid.className='egrid';
    const arrD = document.createElement('div'); arrD.className='arr'; arrD.innerHTML='<span>→</span>';
    egrid.appendChild(mkEG('시작','s',l.s));
    egrid.appendChild(arrD);
    egrid.appendChild(mkEG('종료','e',l.e));
    ep.appendChild(egrid);

    /* read edit value */
    const readEdit = pfx => {
      const groups = ep.querySelectorAll('.egrp');
      const g = pfx==='s' ? groups[0] : groups[1];
      const isAM = g.querySelector('.ap[data-v="AM"]').classList.contains('on');
      const h12 = +document.getElementById('e'+pfx+i+'h').value;
      const m   = +document.getElementById('e'+pfx+i+'m').value;
      let h24;
      if (isAM) { h24 = (h12===12)?0:h12; }
      else      { h24 = (h12===12)?12:h12+12; }
      return h24*60+m;
    };

    const ebtns = document.createElement('div'); ebtns.className='ebtns';
    const eSave = document.createElement('button'); eSave.className='e-save'; eSave.textContent='수정 저장';
    eSave.addEventListener('click', () => {
      const ns = readEdit('s'), ne = readEdit('e');
      if (ne<=ns) { showToast('⚠ 종료 시간을 확인해주세요'); return; }
      const data = load();
      data[key][i] = {s:ns, e:ne, dur:ne-ns};
      data[key].sort((a,b) => a.s-b.s);
      save(data); editIdx=-1;
      showToast('✓ 수정 완료'); renderDay();
      if(curTab==='month') renderMonth();
      if(curTab==='year')  renderYear();
    });
    const eDel = document.createElement('button'); eDel.className='e-del'; eDel.textContent='삭제';
    eDel.addEventListener('click', () => {
      const data = load();
      if (data[key]) { data[key].splice(i,1); }
      save(data); editIdx=-1;
      showToast('삭제됨'); renderDay();
      if(curTab==='month') renderMonth();
      if(curTab==='year')  renderYear();
    });
    ebtns.appendChild(eSave); ebtns.appendChild(eDel);
    ep.appendChild(ebtns);
    logDiv.appendChild(ep);
  });
}

/* ── Month view ── */
let vY = new Date().getFullYear(), vM = new Date().getMonth();
function navMonth(d) {
  vM += d;
  if (vM<0)  { vM=11; vY--; }
  if (vM>11) { vM=0;  vY++; }
  renderMonth();
}
function renderMonth() {
  const data = load();
  const days = new Date(vY, vM+1, 0).getDate();
  const today = todayStr();
  document.getElementById('mLabel').textContent = vY+'.'+p2(vM+1);
  const dm = [];
  for (let d=1; d<=days; d++) {
    const k = vY+'-'+p2(vM+1)+'-'+p2(d);
    dm.push({d, total:(data[k]||[]).reduce((s,l)=>s+l.dur,0), k});
  }
  const maxM = Math.max(1, ...dm.map(x=>x.total));
  document.getElementById('mTotal').textContent = fmtMin(dm.reduce((s,x)=>s+x.total,0));
  const wrap = document.getElementById('moBars'); wrap.innerHTML='';
  const CH = 144;
  dm.forEach(({d,total,k}) => {
    const isT = k===today;
    const unit = document.createElement('div'); unit.className='bunit';
    const bar  = document.createElement('div');
    bar.className = 'bar bar-mo'+(total>0?' lit':'')+(isT?' now':'');
    bar.style.height = Math.round((total/maxM)*CH)+'px';
    const lbl = document.createElement('div'); lbl.className='blbl'; lbl.textContent=d;
    unit.appendChild(bar); unit.appendChild(lbl);
    wrap.appendChild(unit);
  });
}

/* ── Year view ── */
let vYY = new Date().getFullYear();
const MONS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
function navYear(d) { vYY += d; renderYear(); }
function renderYear() {
  const data = load();
  const now = new Date();
  document.getElementById('yLabel').textContent = vYY+'년';
  const mm = [];
  for (let m=0; m<12; m++) {
    let total = 0;
    const days = new Date(vYY, m+1, 0).getDate();
    for (let d=1; d<=days; d++) {
      const k = vYY+'-'+p2(m+1)+'-'+p2(d);
      total += (data[k]||[]).reduce((s,l)=>s+l.dur,0);
    }
    mm.push({m, total});
  }
  const maxM = Math.max(1, ...mm.map(x=>x.total));
  document.getElementById('yTotal').textContent = fmtMin(mm.reduce((s,x)=>s+x.total,0));
  const wrap = document.getElementById('yrBars'); wrap.innerHTML='';
  const CH = 140;
  mm.forEach(({m, total}) => {
    const isCur = vYY===now.getFullYear() && m===now.getMonth();
    const unit = document.createElement('div'); unit.className='bunit';
    const bar  = document.createElement('div');
    bar.className = 'bar bar-yr'+(total>0?' lit':'')+(isCur?' now':'');
    bar.style.height = Math.round((total/maxM)*CH)+'px';
    const lbl = document.createElement('div'); lbl.className='blbl'; lbl.textContent=MONS[m];
    unit.appendChild(bar); unit.appendChild(lbl);
    wrap.appendChild(unit);
  });
}

/* ── Tab switch ── */
let curTab = 'day';
function switchTab(t) {
  curTab = t;
  document.getElementById('vDay').style.display   = t==='day'   ? 'block' : 'none';
  document.getElementById('vMonth').style.display = t==='month' ? 'block' : 'none';
  document.getElementById('vYear').style.display  = t==='year'  ? 'block' : 'none';
  ['Day','Month','Year'].forEach(x =>
    document.getElementById('tab'+x).classList.toggle('on', x.toLowerCase()===t));
  if (t==='month') renderMonth();
  if (t==='year')  renderYear();
}

/* ── Clock ── */
const DAYS = ['일','월','화','수','목','금','토'];
function tick() {
  const now = new Date();
  const h24 = now.getHours(), ap = h24<12?'오전':'오후';
  let h12 = h24%12; if(!h12)h12=12;
  document.getElementById('hDate').textContent =
    now.getFullYear()+'.'+p2(now.getMonth()+1)+'.'+p2(now.getDate());
  document.getElementById('hTime').textContent =
    ap+' '+p2(h12)+':'+p2(now.getMinutes())+':'+p2(now.getSeconds());
  document.getElementById('hDay').textContent = DAYS[now.getDay()]+'요일';
}

/* ── Export / Import ── */
const WEEK = ['일','월','화','수','목','금','토'];

function totalMin24(h24str) {
  const [h,m] = h24str.split(':').map(Number);
  return h*60+m;
}
function fmt24(total) {
  return p2(Math.floor(total/60))+':'+p2(total%60);
}
function fmtMinKo(m) {
  if (!m||m<=0) return '0분';
  const h=Math.floor(m/60), r=m%60;
  if (h===0) return r+'분';
  return r ? h+'시간 '+r+'분' : h+'시간';
}
function dateLabel(key) {
  const [y,mo,d] = key.split('-').map(Number);
  const dow = new Date(y,mo-1,d).getDay();
  return key+' ('+WEEK[dow]+'요일)';
}

function doExport() {
  const data = load();
  const keys = Object.keys(data).sort();
  if (!keys.length) { showToast('⚠ 내보낼 데이터가 없어요'); return; }

  const lines = [];
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('  UJ Study Time Tracker');
  lines.push('  내보내기: '+new Date().toLocaleString('ko-KR'));
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('');

  let grandTotal = 0;
  keys.forEach(key => {
    const logs = (data[key]||[]).filter(l=>l.s!=null&&l.e!=null);
    if (!logs.length) return;
    const dayTotal = logs.reduce((s,l)=>s+l.dur,0);
    grandTotal += dayTotal;
    lines.push('[ '+dateLabel(key)+' ]');
    logs.forEach(l => {
      const pad = '  ';
      const timeStr = fmt24(l.s)+' ~ '+fmt24(l.e);
      const durStr  = fmtMinKo(l.dur);
      // align duration at col 22
      const gap = Math.max(1, 22 - timeStr.length);
      lines.push(pad + timeStr + ' '.repeat(gap) + durStr);
    });
    lines.push('  ─ 합계: '+fmtMinKo(dayTotal));
    lines.push('');
  });

  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('  전체 합계: '+fmtMinKo(grandTotal));
  lines.push('  총 '+keys.length+'일 기록');
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');

  const txt = lines.join('\n');
  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const d    = new Date();
  a.href = url;
  a.download = 'uj_study_'+d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate())+'.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ txt 파일 저장됨');
  updateInfo();
}

function doImport(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const lines = e.target.result.split('\n');
      const data  = load();
      let curKey  = null;
      let added=0, skipped=0;
      // Pattern: YYYY-MM-DD (요일)
      const rDate = /\[\s*(\d{4}-\d{2}-\d{2})/;
      // Pattern: HH:MM ~ HH:MM
      const rLog  = /(\d{2}:\d{2})\s*~\s*(\d{2}:\d{2})/;
      lines.forEach(line => {
        const dm = line.match(rDate);
        if (dm) { curKey = dm[1]; return; }
        if (!curKey) return;
        const lm = line.match(rLog);
        if (!lm) return;
        const s = totalMin24(lm[1]), e = totalMin24(lm[2]);
        if (e <= s) { skipped++; return; }
        if (!data[curKey]) data[curKey] = [];
        // deduplicate
        const exists = data[curKey].some(l => l.s===s && l.e===e);
        if (!exists) { data[curKey].push({s, e, dur:e-s}); added++; }
        else skipped++;
      });
      Object.keys(data).forEach(k => data[k].sort((a,b)=>a.s-b.s));
      save(data);
      showToast('✓ '+added+'개 추가됨'+(skipped?' ('+skipped+'개 중복)':''));
      renderDay();
      if(curTab==='month') renderMonth();
      if(curTab==='year')  renderYear();
      updateInfo();
    } catch(err) {
      showToast('⚠ 파일을 읽을 수 없어요');
    }
  };
  reader.readAsText(file, 'utf-8');
  evt.target.value = '';
}

function updateInfo() {
  const data = load();
  const keys = Object.keys(data).filter(k => (data[k]||[]).length > 0);
  const sessions = keys.reduce((s,k) => s+(data[k]||[]).length, 0);
  const el = document.getElementById('ioInfo');
  if (el) el.textContent = keys.length+'일 · '+sessions+'개 세션 저장됨';
}

/* ── Boot ── */
buildSel();
tick();
setInterval(tick, 1000);
renderDay();
updateInfo();
</script>
