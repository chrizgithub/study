<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UJ Study Time Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0e14;
    --panel: #0f1520;
    --border: #1e2d40;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --text: #c8d8e8;
    --text-dim: #4a6070;
    --bar-glow: rgba(0,212,255,0.3);
    --grid: rgba(30,45,64,0.6);
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow-x: hidden; -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh; min-height: 100dvh;
    padding: 20px 16px 40px;
    overflow-x: hidden;
    width: 100%;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,80,120,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,50,90,0.1) 0%, transparent 60%);
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Header ── */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
  .header-title { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; margin-bottom: 5px; }
  .header-date { font-family: var(--mono); font-size: 24px; color: var(--text); letter-spacing: 1px; line-height: 1; }
  .header-right { text-align: right; }
  .live-time { font-family: var(--mono); font-size: 18px; color: var(--accent2); line-height: 1; margin-bottom: 4px; }
  .live-day { font-family: var(--sans); font-size: 15px; color: var(--text-dim); font-weight: 400; }
  .dot-live { display: inline-block; width: 7px; height: 7px; background: var(--accent2); border-radius: 50%; box-shadow: 0 0 6px var(--accent2); animation: blink 1.5s ease-in-out infinite; margin-right: 5px; vertical-align: middle; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── Panel ── */
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 18px 16px; margin-bottom: 14px; width: 100%; }
  .panel-label { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; letter-spacing: 0; }
  .panel-label-big { font-family: var(--sans); font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 16px; letter-spacing: 0; }

  /* ── Time Input ── */
  .input-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: end; width: 100%; }
  .time-group { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .time-group > label { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--text); }

  /* AM/PM toggle */
  .ampm-row { display: flex; gap: 4px; margin-bottom: 4px; }
  .ampm-btn {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--sans); font-size: 14px; font-weight: 600;
    padding: 8px 0; border-radius: 6px; cursor: pointer; text-align: center;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .ampm-btn.active { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); }

  .hm-row { display: flex; gap: 3px; align-items: center; }
  select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 26px; padding: 12px 0; border-radius: 6px;
    cursor: pointer; appearance: none; -webkit-appearance: none; outline: none;
    transition: border-color 0.2s; flex: 1; min-width: 0;
    text-align: center; -webkit-tap-highlight-color: transparent;
  }
  select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--bar-glow); }
  .sep { font-family: var(--mono); font-size: 26px; color: var(--text-dim); flex-shrink: 0; }
  .arrow-sep { display: flex; align-items: center; justify-content: center; padding-top: 22px; }
  .arrow-sep span { font-family: var(--mono); font-size: 18px; color: var(--text-dim); }

  .btn-row { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; width: 100%; }
  .btn { border-radius: 8px; border: none; cursor: pointer; font-family: var(--mono); letter-spacing: 0.5px; transition: all 0.18s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; width: 100%; }
  .btn-primary { background: var(--accent); color: var(--bg); font-weight: bold; font-size: 22px; padding: 20px 0; letter-spacing: 2px; box-shadow: 0 4px 20px rgba(0,212,255,0.25); }
  .btn-primary:active { opacity: 0.8; transform: scale(0.98); }
  .btn-now { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); font-size: 14px; padding: 13px 8px; font-family: var(--sans); font-weight: 600; letter-spacing: 0; }
  .btn-now:active { opacity: 0.6; }

  /* ── View toggle ── */
  .view-toggle { display: flex; gap: 6px; margin-bottom: 14px; align-items: center; width: 100%; }
  .view-toggle-label { font-family: var(--sans); font-size: 13px; color: var(--text-dim); flex-shrink: 0; }
  .btn-outline { background: transparent; color: var(--text-dim); border: 1px solid var(--border); font-size: 14px; padding: 10px 0; flex: 1; border-radius: 6px; font-family: var(--sans); font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .btn-outline:active { opacity: 0.6; }
  .btn-outline.active { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 8px rgba(0,255,157,0.12); }

  /* ── Chart title ── */
  .chart-title { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .total-badge { font-size: 15px; color: var(--accent2); font-family: var(--mono); }

  /* ── Day chart ── */
  .chart-outer { width: 100%; overflow: hidden; }
  .day-chart { display: flex; align-items: flex-end; gap: 1px; height: 190px; padding-bottom: 36px; position: relative; border-bottom: 1px solid var(--border); width: 100%; }
  .grid-lines { position: absolute; left: 0; right: 0; bottom: 36px; height: 154px; pointer-events: none; }
  .grid-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--grid); opacity: 0.5; }

  .hour-bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 0; height: 100%; justify-content: flex-end; position: relative; }
  .h-bar { width: 100%; background: linear-gradient(to top, var(--accent) 0%, rgba(0,150,200,0.35) 100%); border-radius: 2px 2px 0 0; transition: height 0.4s cubic-bezier(0.34,1.56,0.64,1); min-height: 0; }
  .h-bar.has-data { box-shadow: 0 0 8px var(--bar-glow); }
  .h-bar.now-hour { background: linear-gradient(to top, var(--accent3) 0%, rgba(255,107,53,0.35) 100%); }
  .h-label { font-family: var(--mono); font-size: 7px; color: var(--text-dim); position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); white-space: nowrap; text-align: center; line-height: 1.4; }
  .h-ampm { display: block; color: var(--accent); opacity: 0.75; font-size: 6px; }

  /* ── Period nav (month / year) ── */
  .period-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; width: 100%; }
  .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); font-family: var(--mono); font-size: 18px; width: 40px; height: 40px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .nav-btn:active { opacity: 0.5; }
  .period-label { font-family: var(--mono); font-size: 20px; color: var(--text); flex: 1; text-align: center; }
  .period-total { font-family: var(--mono); font-size: 14px; color: var(--accent2); flex-shrink: 0; }

  /* ── Month chart ── */
  .month-chart { display: flex; align-items: flex-end; gap: 3px; height: 160px; padding-bottom: 24px; position: relative; border-bottom: 1px solid var(--border); width: 100%; }
  .day-bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 0; height: 100%; justify-content: flex-end; position: relative; }
  .d-bar { width: 100%; background: linear-gradient(to top, var(--accent2) 0%, rgba(0,180,100,0.3) 100%); border-radius: 2px 2px 0 0; transition: height 0.4s cubic-bezier(0.34,1.56,0.64,1); min-height: 0; }
  .d-bar.has-data { box-shadow: 0 0 6px rgba(0,255,157,0.2); }
  .d-bar.today-bar { background: linear-gradient(to top, var(--accent3) 0%, rgba(255,107,53,0.3) 100%); box-shadow: 0 0 10px rgba(255,107,53,0.28); }
  .d-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

  /* ── Year chart ── */
  .year-chart { display: flex; align-items: flex-end; gap: 4px; height: 160px; padding-bottom: 28px; position: relative; border-bottom: 1px solid var(--border); width: 100%; }
  .mon-bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 0; height: 100%; justify-content: flex-end; position: relative; }
  .mo-bar { width: 100%; background: linear-gradient(to top, #a78bfa 0%, rgba(120,60,220,0.3) 100%); border-radius: 2px 2px 0 0; transition: height 0.4s cubic-bezier(0.34,1.56,0.64,1); min-height: 0; }
  .mo-bar.has-data { box-shadow: 0 0 8px rgba(167,139,250,0.25); }
  .mo-bar.cur-month { background: linear-gradient(to top, var(--accent3) 0%, rgba(255,107,53,0.3) 100%); box-shadow: 0 0 10px rgba(255,107,53,0.3); }
  .mo-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

  /* ── Log list ── */
  .log-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .log-item { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 15px; padding: 14px 14px; background: var(--bg); border-radius: 6px; border-left: 2px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; width: 100%; transition: border-color 0.2s, background 0.2s; }
  .log-item:active { background: rgba(0,212,255,0.04); }
  .log-item.editing { border-left-color: var(--accent); background: rgba(0,212,255,0.05); }
  .log-time { color: var(--accent); flex: 1; min-width: 0; }
  .log-dur { color: var(--accent2); flex-shrink: 0; }
  .log-icon { color: var(--text-dim); flex-shrink: 0; font-size: 14px; }

  /* ── Edit row ── */
  .edit-row { display: none; flex-direction: column; gap: 12px; padding: 14px; background: rgba(0,212,255,0.04); border: 1px solid var(--accent); border-radius: 6px; margin-top: 2px; width: 100%; }
  .edit-row.open { display: flex; }
  .edit-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: end; }
  .edit-group { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .edit-group > label { font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--text); }
  .edit-hm { display: flex; gap: 3px; align-items: center; }
  .edit-hm select { font-size: 20px; padding: 10px 0; }
  .edit-btns { display: flex; gap: 8px; }
  .btn-save { flex: 2; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-family: var(--sans); font-size: 15px; padding: 13px 0; cursor: pointer; font-weight: bold; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .btn-save:active { opacity: 0.8; }
  .btn-del { flex: 1; background: transparent; color: var(--accent3); border: 1px solid var(--accent3); border-radius: 6px; font-family: var(--sans); font-size: 15px; padding: 13px 0; cursor: pointer; font-weight: 600; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .btn-del:active { opacity: 0.6; }

  .empty-msg { font-family: var(--sans); font-size: 14px; color: var(--text-dim); text-align: center; padding: 24px; opacity: 0.5; width: 100%; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--panel); border: 1px solid var(--accent2); color: var(--accent2); font-family: var(--mono); font-size: 13px; padding: 12px 22px; border-radius: 6px; box-shadow: 0 0 24px rgba(0,255,157,0.2); opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">UJ Study Time Tracker</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="header-right">
    <div class="live-time" id="liveTime"></div>
    <div class="live-day"><span class="dot-live"></span><span id="liveDay"></span></div>
  </div>
</div>

<!-- Input panel -->
<div class="panel">
  <div class="panel-label-big">공부 시간 입력</div>
  <div class="input-grid">
    <!-- Start -->
    <div class="time-group">
      <label>시작</label>
      <div class="ampm-row">
        <button class="ampm-btn" id="sAM" onclick="setAP('s','AM')">오전</button>
        <button class="ampm-btn" id="sPM" onclick="setAP('s','PM')">오후</button>
      </div>
      <div class="hm-row">
        <select id="sH"></select>
        <span class="sep">:</span>
        <select id="sM"></select>
      </div>
    </div>
    <div class="arrow-sep"><span>→</span></div>
    <!-- End -->
    <div class="time-group">
      <label>종료</label>
      <div class="ampm-row">
        <button class="ampm-btn" id="eAM" onclick="setAP('e','AM')">오전</button>
        <button class="ampm-btn" id="ePM" onclick="setAP('e','PM')">오후</button>
      </div>
      <div class="hm-row">
        <select id="eH"></select>
        <span class="sep">:</span>
        <select id="eM"></select>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="recordTime()">저장</button>
    <button class="btn btn-now" onclick="setNowEnd()">현재 시간 종료</button>
  </div>
</div>

<!-- View toggle -->
<div class="view-toggle">
  <span class="view-toggle-label">VIEW</span>
  <button class="btn-outline active" id="btnDay" onclick="switchView('day')">일별</button>
  <button class="btn-outline" id="btnMonth" onclick="switchView('month')">월별</button>
  <button class="btn-outline" id="btnYear" onclick="switchView('year')">연별</button>
</div>

<!-- Day view -->
<div id="dayView">
  <div class="panel">
    <div class="chart-title">
      <span>오늘 공부 현황</span>
      <span class="total-badge" id="dayTotal">총 0분</span>
    </div>
    <div class="chart-outer"><div class="day-chart" id="dayChart"></div></div>
  </div>
  <div class="panel">
    <div class="panel-label">오늘 기록 <span style="color:var(--text-dim);font-size:12px;font-weight:400;">탭하여 수정</span></div>
    <div class="log-list" id="todayLogs"></div>
  </div>
</div>

<!-- Month view -->
<div id="monthView" style="display:none;">
  <div class="panel">
    <div class="period-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <div class="period-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      <span class="period-total" id="monthTotal"></span>
    </div>
    <div class="chart-outer"><div class="month-chart" id="monthChart"></div></div>
  </div>
</div>

<!-- Year view -->
<div id="yearView" style="display:none;">
  <div class="panel">
    <div class="period-nav">
      <button class="nav-btn" onclick="changeYear(-1)">◀</button>
      <div class="period-label" id="yearLabel"></div>
      <button class="nav-btn" onclick="changeYear(1)">▶</button>
      <span class="period-total" id="yearTotal"></span>
    </div>
    <div class="chart-outer"><div class="year-chart" id="yearChart"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ──────────── Helpers ──────────── */
const pad2 = n => String(n).padStart(2,'0');
function todayKey(){ const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function fmtMin(m){
  if(!m||m<=0) return '0분';
  if(m<60) return `${m}분`;
  const h=Math.floor(m/60),r=m%60;
  return r?`${h}h ${r}m`:`${h}h`;
}

/* 24h total-minutes → "오전/오후 h:mm" */
function dispTime(totalMin){
  const h24=Math.floor(totalMin/60), m=totalMin%60;
  const ap=h24<12?'오전':'오후';
  let h12=h24%12; if(!h12)h12=12;
  return `${ap} ${h12}:${pad2(m)}`;
}

/* ──────────── AM/PM state for main input ──────────── */
const AP={s:'AM',e:'AM'};
function setAP(side,val){
  AP[side]=val;
  document.getElementById(side+'AM').classList.toggle('active',val==='AM');
  document.getElementById(side+'PM').classList.toggle('active',val==='PM');
}
function getMin(side){
  const h12=+document.getElementById(side+'H').value;
  const m  =+document.getElementById(side+'M').value;
  let h24;
  if(AP[side]==='AM'){ h24=(h12===12)?0:h12; }
  else               { h24=(h12===12)?12:h12+12; }
  return h24*60+m;
}
function setMin(side,totalMin){
  const h24=Math.floor(totalMin/60), m=totalMin%60;
  const val=h24<12?'AM':'PM';
  let h12=h24%12; if(!h12)h12=12;
  setAP(side,val);
  document.getElementById(side+'H').value=h12;
  document.getElementById(side+'M').value=m;
}

/* ──────────── Build main selects ──────────── */
function buildSelects(){
  ['s','e'].forEach(side=>{
    const hEl=document.getElementById(side+'H');
    const mEl=document.getElementById(side+'M');
    hEl.innerHTML=''; mEl.innerHTML='';
    for(let i=1;i<=12;i++){ const o=new Option(pad2(i),i); hEl.add(o); }
    for(let i=0;i<60;i++){ const o=new Option(pad2(i),i); mEl.add(o); }
  });
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  setMin('s',Math.max(0,nowMin-60));
  setMin('e',nowMin);
}

function setNowEnd(){
  const now=new Date();
  setMin('e', now.getHours()*60+now.getMinutes());
}

/* ──────────── Storage ──────────── */
async function loadAll(){
  try{ const r=await window.storage.get('ujstudylogs'); return r?JSON.parse(r.value):{}; }
  catch{ return {}; }
}
async function saveAll(data){
  try{ await window.storage.set('ujstudylogs',JSON.stringify(data)); }catch{}
}

/* ──────────── Record ──────────── */
async function recordTime(){
  const s=getMin('s'), e=getMin('e');
  if(e<=s){ toast('⚠ 종료 시간을 확인해주세요'); return; }
  const key=todayKey();
  const data=await loadAll();
  if(!data[key]) data[key]=[];
  data[key].push({s,e,dur:e-s});
  data[key].sort((a,b)=>a.s-b.s);
  await saveAll(data);
  toast(`✓ ${fmtMin(e-s)} 저장됨`);
  renderDay();
  if(curView==='month') renderMonth();
  if(curView==='year')  renderYear();
}

/* ──────────── Toast ──────────── */
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ──────────── Day View ──────────── */
let editIdx=-1;

async function renderDay(){
  const key=todayKey();
  const data=await loadAll();
  const logs=data[key]||[];

  /* hourly breakdown */
  const hm=new Array(24).fill(0);
  logs.forEach(l=>{
    for(let h=0;h<24;h++){
      hm[h]+=Math.max(0,Math.min(l.e,h*60+60)-Math.max(l.s,h*60));
    }
  });
  const maxM=Math.max(60,...hm);
  const total=logs.reduce((s,l)=>s+l.dur,0);
  document.getElementById('dayTotal').textContent=`총 ${fmtMin(total)}`;

  /* chart */
  const chart=document.getElementById('dayChart');
  chart.innerHTML='';
  const gl=document.createElement('div'); gl.className='grid-lines';
  [33,66,100].forEach(p=>{ const ln=document.createElement('div'); ln.className='grid-line'; ln.style.bottom=p+'%'; gl.appendChild(ln); });
  chart.appendChild(gl);

  const CH=148, nowH=new Date().getHours();
  for(let h=0;h<24;h++){
    const wrap=document.createElement('div'); wrap.className='hour-bar-wrap';
    const bar=document.createElement('div'); bar.className='h-bar';
    bar.style.height=(maxM>0?Math.round((hm[h]/maxM)*CH):0)+'px';
    if(hm[h]>0) bar.classList.add('has-data');
    if(h===nowH) bar.classList.add('now-hour');

    /* label: show 오전/오후 tag at 0,6,12,18 */
    const lbl=document.createElement('div'); lbl.className='h-label';
    if(h%6===0){
      const tag=document.createElement('span'); tag.className='h-ampm';
      tag.textContent=h<12?'오전':'오후'; lbl.appendChild(tag);
    }
    let h12=h%12; if(!h12)h12=12;
    lbl.appendChild(document.createTextNode(h12+''));
    wrap.appendChild(bar); wrap.appendChild(lbl);
    chart.appendChild(wrap);
  }

  /* log list */
  const logDiv=document.getElementById('todayLogs');
  logDiv.innerHTML='';
  if(!logs.length){ logDiv.innerHTML='<div class="empty-msg">아직 기록이 없어요</div>'; return; }

  logs.forEach((l,i)=>{
    /* row */
    const item=document.createElement('div');
    item.className='log-item'+(editIdx===i?' editing':'');
    item.innerHTML=`<span class="log-time">${dispTime(l.s)} → ${dispTime(l.e)}</span><span class="log-dur">${fmtMin(l.dur)}</span><span class="log-icon">${editIdx===i?'▲':'✎'}</span>`;
    item.addEventListener('click',()=>{ editIdx=(editIdx===i)?-1:i; renderDay(); });
    logDiv.appendChild(item);

    /* edit panel */
    const er=document.createElement('div');
    er.className='edit-row'+(editIdx===i?' open':'');

    const eg=document.createElement('div'); eg.className='edit-grid';

    /* build one edit group */
    const mkGrp=(lbl,pfx,defMin)=>{
      const h24e=Math.floor(defMin/60), me=defMin%60;
      const ape=h24e<12?'AM':'PM';
      let h12e=h24e%12; if(!h12e)h12e=12;

      const g=document.createElement('div'); g.className='edit-group';
      const la=document.createElement('label'); la.textContent=lbl; g.appendChild(la);

      /* ampm */
      const apr=document.createElement('div'); apr.className='ampm-row';
      const amB=document.createElement('button'); amB.className='ampm-btn'+(ape==='AM'?' active':''); amB.textContent='오전'; amB.dataset.ap='AM';
      const pmB=document.createElement('button'); pmB.className='ampm-btn'+(ape==='PM'?' active':''); pmB.textContent='오후'; pmB.dataset.ap='PM';
      [amB,pmB].forEach(b=>b.addEventListener('click',()=>{ amB.classList.toggle('active',b.dataset.ap==='AM'); pmB.classList.toggle('active',b.dataset.ap==='PM'); }));
      apr.appendChild(amB); apr.appendChild(pmB); g.appendChild(apr);

      /* hm */
      const hr=document.createElement('div'); hr.className='edit-hm';
      const sh=document.createElement('select'); sh.id=`e${pfx}${i}h`;
      const sm=document.createElement('select'); sm.id=`e${pfx}${i}m`;
      for(let v=1;v<=12;v++) sh.add(new Option(pad2(v),v));
      for(let v=0;v<60;v++) sm.add(new Option(pad2(v),v));
      sh.value=h12e; sm.value=me;
      const sp=document.createElement('span'); sp.className='sep'; sp.textContent=':';
      hr.appendChild(sh); hr.appendChild(sp); hr.appendChild(sm); g.appendChild(hr);
      return g;
    };

    const arrD=document.createElement('div'); arrD.className='arrow-sep'; arrD.innerHTML='<span>→</span>';
    eg.appendChild(mkGrp('시작','s',l.s));
    eg.appendChild(arrD);
    eg.appendChild(mkGrp('종료','e',l.e));
    er.appendChild(eg);

    /* save / del buttons */
    const bts=document.createElement('div'); bts.className='edit-btns';
    const sv=document.createElement('button'); sv.className='btn-save'; sv.textContent='수정 저장';
    sv.addEventListener('click',()=>{
      /* read edit values */
      const readMin=(pfx)=>{
        const hv=+document.getElementById(`e${pfx}${i}h`).value;
        const mv=+document.getElementById(`e${pfx}${i}m`).value;
        const amActive=er.querySelectorAll(`.ampm-btn.active`)[pfx==='s'?0:1];
        /* find the active button in the corresponding group */
        const groups=er.querySelectorAll('.edit-group');
        const grpIdx=pfx==='s'?0:1;
        const activeAP=groups[grpIdx].querySelector('.ampm-btn.active');
        const ap=activeAP?activeAP.dataset.ap:'AM';
        let h24; if(ap==='AM'){h24=hv===12?0:hv;}else{h24=hv===12?12:hv+12;}
        return h24*60+mv;
      };
      const ns=readMin('s'), ne=readMin('e');
      if(ne<=ns){ toast('⚠ 종료 시간을 확인해주세요'); return; }
      (async()=>{
        const data=await loadAll();
        data[key][i]={s:ns,e:ne,dur:ne-ns};
        data[key].sort((a,b)=>a.s-b.s);
        await saveAll(data);
        editIdx=-1; toast('✓ 수정 완료');
        renderDay();
        if(curView==='month') renderMonth();
        if(curView==='year')  renderYear();
      })();
    });
    const dl=document.createElement('button'); dl.className='btn-del'; dl.textContent='삭제';
    dl.addEventListener('click',()=>{
      (async()=>{
        const data=await loadAll();
        if(data[key]) data[key].splice(i,1);
        await saveAll(data);
        editIdx=-1; toast('삭제됨');
        renderDay();
        if(curView==='month') renderMonth();
        if(curView==='year')  renderYear();
      })();
    });
    bts.appendChild(sv); bts.appendChild(dl); er.appendChild(bts);
    logDiv.appendChild(er);
  });
}

/* ──────────── Month View ──────────── */
let vYear=new Date().getFullYear(), vMonth=new Date().getMonth();
function changeMonth(d){ vMonth+=d; if(vMonth<0){vMonth=11;vYear--;} if(vMonth>11){vMonth=0;vYear++;} renderMonth(); }

async function renderMonth(){
  const data=await loadAll();
  const days=new Date(vYear,vMonth+1,0).getDate();
  const todayStr=todayKey();
  document.getElementById('monthLabel').textContent=`${vYear}.${pad2(vMonth+1)}`;
  const dayMins=[];
  for(let d=1;d<=days;d++){
    const k=`${vYear}-${pad2(vMonth+1)}-${pad2(d)}`;
    dayMins.push({d,total:(data[k]||[]).reduce((s,l)=>s+l.dur,0),k});
  }
  const maxM=Math.max(1,...dayMins.map(x=>x.total));
  document.getElementById('monthTotal').textContent=fmtMin(dayMins.reduce((s,x)=>s+x.total,0));
  const chart=document.getElementById('monthChart'); chart.innerHTML='';
  dayMins.forEach(({d,total,k})=>{
    const isT=k===todayStr;
    const wrap=document.createElement('div'); wrap.className='day-bar-wrap';
    const bar=document.createElement('div'); bar.className='d-bar'+(isT?' today-bar':'');
    bar.style.height=Math.round((total/maxM)*136)+'px';
    if(total>0) bar.classList.add('has-data');
    const lbl=document.createElement('div'); lbl.className='d-label'; lbl.textContent=d;
    wrap.appendChild(bar); wrap.appendChild(lbl); chart.appendChild(wrap);
  });
}

/* ──────────── Year View ──────────── */
let vYearY=new Date().getFullYear();
function changeYear(d){ vYearY+=d; renderYear(); }
const MON=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

async function renderYear(){
  const data=await loadAll();
  const now=new Date();
  document.getElementById('yearLabel').textContent=`${vYearY}년`;
  const monMins=[];
  for(let m=0;m<12;m++){
    let total=0;
    const days=new Date(vYearY,m+1,0).getDate();
    for(let d=1;d<=days;d++){
      const k=`${vYearY}-${pad2(m+1)}-${pad2(d)}`;
      total+=(data[k]||[]).reduce((s,l)=>s+l.dur,0);
    }
    monMins.push({m,total});
  }
  const maxM=Math.max(1,...monMins.map(x=>x.total));
  document.getElementById('yearTotal').textContent=fmtMin(monMins.reduce((s,x)=>s+x.total,0));
  const chart=document.getElementById('yearChart'); chart.innerHTML='';
  monMins.forEach(({m,total})=>{
    const isCur=vYearY===now.getFullYear()&&m===now.getMonth();
    const wrap=document.createElement('div'); wrap.className='mon-bar-wrap';
    const bar=document.createElement('div'); bar.className='mo-bar'+(isCur?' cur-month':'');
    bar.style.height=Math.round((total/maxM)*134)+'px';
    if(total>0) bar.classList.add('has-data');
    const lbl=document.createElement('div'); lbl.className='mo-label'; lbl.textContent=MON[m];
    wrap.appendChild(bar); wrap.appendChild(lbl); chart.appendChild(wrap);
  });
}

/* ──────────── View switch ──────────── */
let curView='day';
function switchView(v){
  curView=v;
  ['day','month','year'].forEach(x=>{
    document.getElementById(x+'View').style.display=x===v?'block':'none';
    document.getElementById('btn'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===v);
  });
  if(v==='month') renderMonth();
  if(v==='year')  renderYear();
}

/* ──────────── Clock ──────────── */
function updateClock(){
  const now=new Date();
  const days=['일','월','화','수','목','금','토'];
  const h24=now.getHours(); const ap=h24<12?'오전':'오후';
  let h12=h24%12; if(!h12)h12=12;
  document.getElementById('headerDate').textContent=`${now.getFullYear()}.${pad2(now.getMonth()+1)}.${pad2(now.getDate())}`;
  document.getElementById('liveTime').textContent=`${ap} ${pad2(h12)}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
  document.getElementById('liveDay').textContent=days[now.getDay()]+'요일';
}

/* ──────────── Boot ──────────── */
buildSelects();
updateClock();
setInterval(updateClock,1000);
renderDay();
</script>
</body>
